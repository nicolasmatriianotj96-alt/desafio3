openapi: 3.0.3
info:
  title: Task Manager API
  description: >
    API RESTful para gerenciamento de tarefas colaborativo: contas de usuário,
    categorias, tarefas com prioridade/status/prazo, colaboração entre usuários
    e relatórios agregados.
  version: 1.0.0
servers:
  - url: /api
    description: Prefixo padrão da API (local ou Lambda atrás do API Gateway)

tags:
  - name: Auth
  - name: Users
  - name: Categories
  - name: Tasks
  - name: Reports

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Cria uma nova conta de usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: E-mail já cadastrado
        '422':
          description: Dados inválidos

  /auth/login:
    post:
      tags: [Auth]
      summary: Autentica um usuário e retorna um token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Login efetuado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Credenciais inválidas

  /auth/me:
    get:
      tags: [Auth]
      summary: Retorna os dados do usuário autenticado
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Usuário atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Não autenticado

  /users/search:
    get:
      tags: [Users]
      summary: Busca usuários por e-mail (para adicionar como colaborador)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: email
          required: true
          schema: { type: string }
          description: Trecho do e-mail a buscar (mínimo 3 caracteres)
      responses:
        '200':
          description: Lista de usuários encontrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: '#/components/schemas/User' }

  /categories:
    get:
      tags: [Categories]
      summary: Lista as categorias do usuário autenticado
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Lista de categorias
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
    post:
      tags: [Categories]
      summary: Cria uma nova categoria
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '201':
          description: Categoria criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  category: { $ref: '#/components/schemas/Category' }

  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/CategoryId'
    get:
      tags: [Categories]
      summary: Obtém uma categoria por id
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Categoria encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  category: { $ref: '#/components/schemas/Category' }
        '404': { description: Categoria não encontrada }
    put:
      tags: [Categories]
      summary: Atualiza uma categoria
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '200':
          description: Categoria atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  category: { $ref: '#/components/schemas/Category' }
        '404': { description: Categoria não encontrada }
    delete:
      tags: [Categories]
      summary: Remove uma categoria
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Categoria removida }
        '404': { description: Categoria não encontrada }

  /tasks:
    get:
      tags: [Tasks]
      summary: Lista as tarefas visíveis ao usuário (próprias ou como colaborador)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, in_progress, done] }
        - in: query
          name: categoryId
          schema: { type: string, format: uuid }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          description: Lista de tarefas
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items: { $ref: '#/components/schemas/Task' }
    post:
      tags: [Tasks]
      summary: Cria uma nova tarefa
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Tarefa criada
          content:
            application/json:
              schema:
                type: object
                properties:
                  task: { $ref: '#/components/schemas/Task' }

  /tasks/{id}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    get:
      tags: [Tasks]
      summary: Obtém uma tarefa por id
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Tarefa encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  task: { $ref: '#/components/schemas/Task' }
        '404': { description: Tarefa não encontrada }
    put:
      tags: [Tasks]
      summary: Atualiza uma tarefa (dono ou colaborador)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '200':
          description: Tarefa atualizada
          content:
            application/json:
              schema:
                type: object
                properties:
                  task: { $ref: '#/components/schemas/Task' }
        '404': { description: Tarefa não encontrada }
    delete:
      tags: [Tasks]
      summary: Remove uma tarefa (apenas o dono)
      security: [{ bearerAuth: [] }]
      responses:
        '204': { description: Tarefa removida }
        '404': { description: Tarefa não encontrada ou usuário não é o dono }

  /tasks/{id}/collaborators:
    parameters:
      - $ref: '#/components/parameters/TaskId'
    post:
      tags: [Tasks]
      summary: Adiciona um colaborador à tarefa pelo e-mail (apenas o dono)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: Colaborador adicionado
          content:
            application/json:
              schema:
                type: object
                properties:
                  task: { $ref: '#/components/schemas/Task' }
        '403': { description: Usuário não é o dono da tarefa }
        '404': { description: Usuário não encontrado }

  /tasks/{id}/collaborators/{userId}:
    parameters:
      - $ref: '#/components/parameters/TaskId'
      - in: path
        name: userId
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Tasks]
      summary: Remove um colaborador da tarefa (apenas o dono)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Colaborador removido
          content:
            application/json:
              schema:
                type: object
                properties:
                  task: { $ref: '#/components/schemas/Task' }
        '403': { description: Usuário não é o dono da tarefa }

  /reports/summary:
    get:
      tags: [Reports]
      summary: Retorna contagens agregadas das tarefas visíveis ao usuário
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Resumo estatístico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportSummary'

  /reports/by-category:
    get:
      tags: [Reports]
      summary: Retorna a distribuição de tarefas por categoria
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Distribuição por categoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items: { $ref: '#/components/schemas/CategoryReport' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CategoryId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    TaskId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

  schemas:
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        created_at: { type: string, format: date-time }

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name: { type: string, minLength: 2, maxLength: 120 }
        email: { type: string, format: email }
        password: { type: string, minLength: 6, maxLength: 72 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        token: { type: string, description: JWT a ser enviado como "Bearer <token>" }

    Category:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        color: { type: string, example: '#f97316' }
        owner_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    CategoryInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        color: { type: string, example: '#f97316' }

    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        status: { type: string, enum: [pending, in_progress, done] }
        priority: { type: string, enum: [low, medium, high] }
        due_date: { type: string, format: date, nullable: true }
        category_id: { type: string, format: uuid, nullable: true }
        category_name: { type: string, nullable: true }
        category_color: { type: string, nullable: true }
        owner_id: { type: string, format: uuid }
        is_owner: { type: boolean }
        collaborators:
          type: array
          items: { $ref: '#/components/schemas/User' }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TaskInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 160 }
        description: { type: string, maxLength: 4000 }
        status: { type: string, enum: [pending, in_progress, done] }
        priority: { type: string, enum: [low, medium, high] }
        dueDate: { type: string, format: date }
        categoryId: { type: string, format: uuid }

    ReportSummary:
      type: object
      properties:
        total: { type: integer }
        byStatus:
          type: object
          properties:
            pending: { type: integer }
            in_progress: { type: integer }
            done: { type: integer }
        byPriority:
          type: object
          properties:
            low: { type: integer }
            medium: { type: integer }
            high: { type: integer }
        overdue: { type: integer }
        completionRate: { type: integer, description: 'Percentual de tarefas concluídas (0-100)' }

    CategoryReport:
      type: object
      properties:
        categoryId: { type: string, format: uuid }
        categoryName: { type: string }
        categoryColor: { type: string }
        total: { type: integer }
        done: { type: integer }
