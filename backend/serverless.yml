service: task-manager-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs20.x
  region: ${opt:region, 'sa-east-1'}
  stage: ${opt:stage, 'dev'}
  memorySize: 512
  timeout: 15
  httpApi:
    cors:
      allowedOrigins:
        - ${env:FRONTEND_URL, '*'}
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  environment:
    NODE_ENV: production
    DATABASE_URL: ${env:DATABASE_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    JWT_EXPIRES_IN: ${env:JWT_EXPIRES_IN, '7d'}
    FRONTEND_URL: ${env:FRONTEND_URL, '*'}
    OTEL_ENABLED: ${env:OTEL_ENABLED, 'false'}
    OTEL_SERVICE_NAME: ${env:OTEL_SERVICE_NAME, 'task-manager-api'}
    OTEL_EXPORTER_OTLP_ENDPOINT: ${env:OTEL_EXPORTER_OTLP_ENDPOINT, ''}

functions:
  api:
    handler: src/lambda.handler
    events:
      - httpApi: '*'

plugins:
  - serverless-esbuild
  - serverless-offline

custom:
  esbuild:
    bundle: true
    minify: true
    sourcemap: false
    platform: node
    target: node20
    exclude:
      - aws-sdk
    # Nunca resolvidos/empacotados pelo esbuild: pg-native é um binding nativo
    # opcional do "pg" (nunca instalado, requerido dentro de um try/catch);
    # swagger-ui-express e os pacotes @opentelemetry/* já são carregados via
    # require dinâmico e só rodam fora do Lambda (ver src/app.js e
    # src/telemetry/tracing.js) — não precisam existir no pacote de deploy.
    external:
      - pg-native
      - swagger-ui-express
      - '@opentelemetry/sdk-node'
      - '@opentelemetry/exporter-trace-otlp-http'
      - '@opentelemetry/auto-instrumentations-node'
      - '@opentelemetry/resources'
      - '@opentelemetry/semantic-conventions'
  serverless-offline:
    httpPort: 3000
